name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install SIM dependencies
        run: python -m pip install -r requirements-sim.txt
      - name: Run ROGUE:OPS test suite
        run: python tools/run_all_tests.py
