# ROGUE:OPS — always-up console (and optional paper loop).
#
#   docker compose up -d --build        # start, rebuild
#   docker compose logs -f console      # follow logs
#   docker compose down                 # stop
#
# The console is published to the HOST LOOPBACK ONLY (127.0.0.1:8787) — never to
# the LAN. State persists in ./.roguedata (kill file, shadow ledger, audit), so
# an engaged kill SURVIVES restarts and is honored on boot. Put MASSIVE_API_KEY
# (and any others) in a local .env file next to this one — never commit it.

services:
  console:
    build: .
    image: rogue-ops-console
    container_name: rogue-console
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      - TERMINAL_BIND=0.0.0.0
      - TERMINAL_PORT=8787
      - ROGUE_OPS_HOME=/data
      # Research over Massive (daily) — supply via .env, do not hard-code:
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
      # Shadow LLM reads use the host's Ollama:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./.roguedata:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host services (Ollama) from Linux engines

  # ----------------------------------------------------------------------------
  # PAPER trading loop (GCP-free, IBKR live feed). Opt-in via the "paper"
  # profile so the default `docker compose up` stays console-only:
  #
  #     docker compose --profile paper up -d --build
  #
  # Requirements (see DOCKER.md):
  #   - IB Gateway running on the host, API enabled, PAPER port 4002, with this
  #     container's address added to Gateway "Trusted IPs".
  #   - vendor/ibapi present (IB's TWS API python client) for Dockerfile.paper.
  #   - No proven edge yet — this is PAPER. Real capital stays gated on the
  #     signed re-cert + capital preflight, which this does not change.
  # The loop shares ./.roguedata with the console, so the console KILL button
  # halts it (writes /data/KILL; honored on the next cycle, restart to resume).
  # ----------------------------------------------------------------------------
  loop:
    build:
      context: .
      dockerfile: Dockerfile.paper
    image: rogue-ops-paper
    container_name: rogue-loop
    restart: unless-stopped
    profiles: ["paper"]
    command: ["python", "tools/run_paper_ibkr.py"]
    environment:
      - EXECUTION_MODE=PAPER
      - OPS_MODE=PAPER
      - ROGUE_OPS_HOME=/data
      - IBKR_HOST=host.docker.internal
      - IBKR_PORT=4002
      - IBKR_ACCOUNT_ID=${IBKR_ACCOUNT_ID:-}
      - PRIMARY_SYMBOL=${PRIMARY_SYMBOL:-SPY}
      - IBKR_BAR_SIZE=${IBKR_BAR_SIZE:-1 min}
      - OLLAMA_SHADOW=${OLLAMA_SHADOW:-1}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./.roguedata:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
